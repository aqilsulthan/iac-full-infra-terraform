name: Terraform Apply

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply-dev
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-3
  TF_IN_AUTOMATION: "true"
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_app_ingress_cidr_blocks: ${{ vars.APP_INGRESS_CIDR_BLOCKS }}

jobs:
  apply:
    name: Apply dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=environments/dev init -input=false

      - name: Terraform validate
        run: terraform -chdir=environments/dev validate

      - name: Terraform plan
        run: terraform -chdir=environments/dev plan -input=false -no-color -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=environments/dev apply -input=false -auto-approve tfplan
