name: Terraform Plan

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.tf"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-3
  TF_IN_AUTOMATION: "true"
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_app_ingress_cidr_blocks: ${{ vars.APP_INGRESS_CIDR_BLOCKS }}

jobs:
  plan:
    name: Plan dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=environments/dev init -input=false

      - name: Terraform validate
        run: terraform -chdir=environments/dev validate

      - name: Terraform plan
        id: plan
        run: terraform -chdir=environments/dev plan -input=false -no-color -out=tfplan

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              "#### Terraform Plan",
              "",
              "Status: success",
              `Actor: @${{ github.actor }}`,
              `Workflow: ${{ github.workflow }}`
            ].join("\n");

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
