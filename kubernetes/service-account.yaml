apiVersion: v1
kind: ServiceAccount
metadata:
  name: app
  namespace: app
  labels:
    app: iac-full-infra
    environment: dev
    project: iac-full-infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: app-pod-exec
  labels:
    app: iac-full-infra
    environment: dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: app
    namespace: app
